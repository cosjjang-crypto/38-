<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교육전문직 시험 학습 관리 v4</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F9FB;--sur:#FFF;--sur2:#F3F4F6;--bdr:#E5E7EB;--bdr2:#D1D5DB;--tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;--bl:#2563EB;--blbg:#EFF6FF;--gn:#059669;--gnbg:#ECFDF5;--rd:#DC2626;--rdbg:#FEF2F2;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
.app{max-width:980px;margin:0 auto;padding:20px 16px 60px}
.hdr{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);padding:20px 24px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px}
.hdr-ttl{font-size:18px;font-weight:700}.hdr-sub{font-size:12px;color:var(--tx2);margin-top:3px}
.cd{text-align:center;background:var(--rdbg);border:1px solid #FECACA;border-radius:var(--rs);padding:10px 18px}
.cd-n{font-size:30px;font-weight:700;color:var(--rd);line-height:1}.cd-l{font-size:11px;color:#EF4444;margin-top:2px}
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.met{background:var(--sur2);border-radius:var(--rs);padding:10px 12px}
.met-v{font-size:20px;font-weight:600}.met-l{font-size:11px;color:var(--tx2);margin-top:2px}
.pb{height:6px;background:var(--bdr);border-radius:3px;margin-top:12px;overflow:hidden}
.pf{height:100%;background:var(--bl);border-radius:3px;transition:width .5s}
.pt{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--tx3)}
.tabs{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:5px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow-x:auto}
.tb{flex:1;min-width:80px;padding:8px 12px;border:none;background:transparent;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.tb.on{background:var(--bl);color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.3)}.tb:hover:not(.on){background:var(--sur2);color:var(--tx)}
.dc{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);padding:18px 20px;margin-bottom:10px;transition:border-color .2s}
.dc.cur{border-left:3px solid var(--bl)}.dc.dnc{border-left:3px solid var(--gn)}.dc.fd{opacity:.6}
.dh{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.db{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.tlbl{font-size:11px;font-weight:600;background:var(--blbg);color:var(--bl);padding:3px 8px;border-radius:20px}
.ptag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.dttl{font-size:15px;font-weight:600;flex:1}
.ddt{font-size:12px;color:var(--tx2)}
.dt{border-top:1px solid var(--bdr);padding-top:10px;margin-top:4px}
.di{display:grid;grid-template-columns:68px 1fr;gap:6px;padding:5px 0}
.dl{font-size:11px;font-weight:600;color:var(--tx2);padding-top:2px}
.dv{font-size:13px;line-height:1.5}
.tp{font-size:12px;color:var(--tx2);margin-top:6px;padding:7px 10px;background:var(--sur2);border-radius:var(--rs);border-left:3px solid var(--bl)}
.das{display:flex;gap:8px;align-items:flex-start;margin-top:10px;flex-wrap:wrap}
.na{flex:1;min-width:180px;padding:8px 10px;border:1px solid var(--bdr2);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--sur2);color:var(--tx);resize:none;outline:none}
.na:focus{border-color:var(--bl)}
.btn{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--bdr2);background:var(--sur);font-size:13px;font-weight:500;font-family:inherit;color:var(--tx);cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--sur2)}.btn-dn{background:var(--gnbg);border-color:#86EFAC;color:var(--gn)}.btn-pr{background:var(--bl);border-color:var(--bl);color:#fff}
.btn-pr:hover{background:#1D4ED8}.btn-sm{padding:5px 12px;font-size:12px}
.wh{font-size:12px;font-weight:600;color:var(--tx2);padding:10px 14px 6px;border-bottom:1px solid var(--bdr);background:var(--sur2)}
.sr{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--bdr)}
.sr:last-child{border-bottom:none}.sr:hover{background:var(--sur2)}.sr.tdr{background:var(--blbg)}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdy{font-size:12px;color:var(--tx2);min-width:30px;font-weight:500}
.sdt{font-size:12px;color:var(--tx3);min-width:38px}
.stl{font-size:13px;flex:1}
.ti{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);transition:background .1s}
.ti:last-child{border-bottom:none}.ti:hover{background:var(--sur2)}
.tno{width:28px;height:28px;border-radius:50%;background:var(--sur2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx2);flex-shrink:0;font-weight:500}
.tnm{font-size:13px;font-weight:500}.tnm.dn{text-decoration:line-through;color:var(--tx3)}
.tcd{font-size:11px;color:var(--tx3);margin-top:1px}
.pri{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.nc{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);padding:14px 16px;margin-bottom:8px}
.nm{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.nb{font-size:13px;color:var(--tx2);white-space:pre-wrap;line-height:1.6}
.es{text-align:center;padding:48px 0;color:var(--tx3);font-size:14px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.mo.op{display:flex}
.mi{background:var(--sur);border-radius:var(--r);padding:22px 24px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--bdr)}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.mc{background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;padding:0 4px;line-height:1}
.mt{font-size:15px;font-weight:600;margin-bottom:10px}
.mr{padding:8px 0;border-top:1px solid var(--bdr)}
.ml{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.mv{font-size:13px;line-height:1.6}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
/* Calendar */
.cln{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.clt{font-size:15px;font-weight:600}
.clg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.cld{background:var(--sur2);padding:6px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--tx2);border-bottom:1px solid var(--bdr)}
.cld.su{color:#DC2626}.cld.sa{color:#2563EB}
.clc{border:0.5px solid var(--bdr);min-height:76px;padding:4px;cursor:pointer;transition:background .1s;font-size:10px}
.clc:hover{background:var(--sur2)}.clc.em{background:var(--sur2);cursor:default}
.clc.tdc{outline:2px solid var(--bl);outline-offset:-2px}.clc.exc{background:#FEF2F2}
.cdn{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:2px}
.cdn.su{color:#DC2626}.cdn.sa{color:#2563EB}
.cdn.tn{background:var(--bl);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.cev{border-radius:3px;padding:2px 4px;font-size:10px;line-height:1.3;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cleg{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;font-size:11px}
.cli{display:flex;align-items:center;gap:4px;color:var(--tx2)}
.clt2{width:10px;height:10px;border-radius:2px}
.cti{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-top:10px;min-height:56px}
@media(max-width:600px){.mets{grid-template-columns:repeat(2,1fr)}.hdr-top{flex-direction:column}.di{grid-template-columns:56px 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div><div class="hdr-ttl">교육전문직 시험 학습 관리</div><div class="hdr-sub">1차 시험: 2026년 5월 30일 · 51일 하루 완결 심화 과정 (4월 9일 시작)</div></div>
      <div class="cd"><div class="cd-n" id="dd">-</div><div class="cd-l">시험까지</div></div>
    </div>
    <div class="mets">
      <div class="met"><div class="met-v" id="m0">0</div><div class="met-l">완료한 날</div></div>
      <div class="met"><div class="met-v" id="m1">51</div><div class="met-l">남은 날</div></div>
      <div class="met"><div class="met-v" id="m2">0%</div><div class="met-l">전체 진도</div></div>
      <div class="met"><div class="met-v" id="m3">0/20</div><div class="met-l">완료 주제</div></div>
    </div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pt"><span id="pl">0일 완료</span><span id="pr">51일 남음</span></div>
  </div>
  <div class="tabs">
    <button class="tb on" onclick="sw('today')">오늘 학습</button>
    <button class="tb" onclick="sw('sched')">전체 일정</button>
    <button class="tb" onclick="sw('cal')">달력 보기</button>
    <button class="tb" onclick="sw('topics')">20개 주제</button>
    <button class="tb" onclick="sw('notes')">메모 모음</button>
  </div>
  <div id="tc"></div>
</div>
<div class="mo" id="mo"><div class="mi" id="mi"></div></div>
<script>
const EXAM=new Date('2026-05-30'),START=new Date('2026-04-09');
const PH={P1:{l:'구조재정비',c:'#2563EB',bg:'#DBEAFE'},P2_4:{l:'필수★★★★',c:'#BE185D',bg:'#FCE7F3'},P2_3:{l:'필수★★★',c:'#059669',bg:'#D1FAE5'},P2_2:{l:'필수★★',c:'#D97706',bg:'#FEF3C7'},P2_1:{l:'필수★',c:'#7C3AED',bg:'#EDE9FE'},P3:{l:'통합심화',c:'#EA580C',bg:'#FED7AA'},P4:{l:'최종점검',c:'#4B5563',bg:'#F3F4F6'}};

  const d=dc(),p=Math.round(d/51*100);
  document.getElementById('dd').textContent='D-'+dl();
  document.getElementById('m0').textContent=d;document.getElementById('m1').textContent=51-d;
  document.getElementById('m2').textContent=p+'%';document.getElementById('m3').textContent=tc()+'/20';
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('pl').textContent=d+'일 완료';document.getElementById('pr').textContent=(51-d)+'일 남음';
}
function sw(id){
  A.tab=id;
  const lbl={today:'오늘 학습',sched:'전체 일정',cal:'달력 보기',topics:'20개 주제',notes:'메모 모음'};
  document.querySelectorAll('.tb').forEach(b=>{b.classList.toggle('on',b.textContent.trim()===lbl[id]);});
  rt();
}
function rt(){
  const el=document.getElementById('tc');
  if(A.tab==='today')rToday(el);
  else if(A.tab==='sched')rSched(el);
  else if(A.tab==='cal')rCal(el);
  else if(A.tab==='topics')rTopics(el);
  else rNotes(el);
}
function rToday(el){
  const td=dn();const days=[Math.max(1,td-1),td,Math.min(51,td+1)];
  el.innerHTML=days.map(d=>{
    const [n,dt,wd,h,pc,tl,bg,is,es,tp]=S[d-1];
    const p=ph(pc);const done=A.done[n];const isT=d===td;
    return`<div class="dc${isT?' cur':''}${done?' dnc':''}${!isT?' fd':''}">
      <div class="dh">
        <div class="db" style="background:${p.bg};color:${p.c}">D${n}</div>
        ${isT?'<span class="tlbl">오늘</span>':''}
        <span class="ptag" style="background:${p.bg};color:${p.c}">${p.l}</span>
        <span class="ddt">${dt}</span><div style="flex:1"></div>
        ${isT?`<button class="btn${done?' btn-dn':''}" onclick="tgD(${n})">${done?'✓ 완료됨':'완료 체크'}</button>`:''}
      </div>
      <div class="dttl">${tl}</div>
      <div class="dt">
        <div class="di"><div class="dl">배경·맥락</div><div class="dv">${bg}</div></div>
        <div class="di"><div class="dl">핵심 쟁점</div><div class="dv" style="color:#DC2626">${is}</div></div>
        <div class="di"><div class="dl">논술 과제</div><div class="dv">${es}</div></div>
      </div>
      <div class="tp">⏱ ${tp}</div>
      ${isT?`<div class="das"><textarea class="na" rows="2" placeholder="오늘 학습 메모..." id="nt-${n}">${A.notes[n]||''}</textarea><button class="btn btn-pr" onclick="sN(${n})">저장</button></div>`:''}
    </div>`;
  }).join('');
}
function rSched(el){
  let h='<div style="background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);">';
  let wk=0;
  S.forEach(([n,dt,wd,hrs,pc,tl])=>{
    const w=Math.ceil(n/7);
    if(w!==wk){wk=w;h+=`<div class="wh">${w}주차 (Day ${(w-1)*7+1}~${Math.min(w*7,51)})</div>`;}
    const p=ph(pc);const done=A.done[n];const isT=n===dn();
    h+=`<div class="sr${isT?' tdr':''}" onclick="om(${n})">
      <div class="sd" style="background:${done?'#059669':p.c}"></div>
      <span class="sdy">D${n}</span><span class="sdt">${dt}</span>
      <span class="stl">${tl}</span>
      <span class="ptag" style="background:${p.bg};color:${p.c};font-size:11px;padding:2px 7px">${p.l}</span>
      ${done?'<span style="font-size:11px;color:#059669;font-weight:600">완료</span>':''}
    </div>`;
  });
  el.innerHTML=h+'</div>';
}
function rCal(el){
  if(!window._calY){window._calY=2026;window._calM=3;}
  const y=window._calY,m=window._calM;
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const fd=new Date(y,m-1,1).getDay();
  const dim=new Date(y,m,0).getDate();
  const dows=['일','월','화','수','목','금','토'];
  const t=new Date();t.setHours(0,0,0,0);
  const sch={};
  S.forEach(([n,dt,,h,pc,tl])=>{
    const parts=dt.split('/');let sm,sd;
    if(parts.length===2){sm=parseInt(parts[0]);sd=parseInt(parts[1]);}
    if(sm&&sd){const k=`${y}-${String(sm).padStart(2,'0')}-${String(sd).padStart(2,'0')}`;sch[k]={n,pc,tl,h};}
  });
  let html=`<div class="cln"><button class="btn btn-sm" onclick="chM(-1)">← 이전</button><span class="clt">${y}년 ${mn[m-1]}</span><button class="btn btn-sm" onclick="chM(1)">다음 →</button></div>`;
  html+=`<div class="clg">${dows.map((d,i)=>`<div class="cld${i===0?' su':i===6?' sa':''}">${d}</div>`).join('')}`;
  for(let i=0;i<fd;i++)html+=`<div class="clc em"></div>`;
  for(let day=1;day<=dim;day++){
    const dow=(fd+day-1)%7;
    const k=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const ev=sch[k];const isExam=k==='2026-05-30';
    const td2=new Date(y,m-1,day);td2.setHours(0,0,0,0);const isT=td2.getTime()===t.getTime();
    let dnH=isT?`<div class="cdn tn">${day}</div>`:`<div class="cdn${dow===0?' su':dow===6?' sa':''}">${day}</div>`;
    let evH='';
    if(isExam)evH=`<div class="cev" style="background:#FEE2E2;color:#991B1B">🎯 시험일</div>`;
    else if(ev){const p=ph(ev.pc);evH=`<div class="cev" style="background:${p.bg};color:${p.c}">D${ev.n} ${ev.tl}</div>`;}
    html+=`<div class="clc${isT?' tdc':''}${isExam?' exc':''}" onclick="om2('${k}',${ev?ev.n:-1})">${dnH}${evH}</div>`;
  }
  const rem=7-(fd+dim)%7;if(rem<7)for(let i=0;i<rem;i++)html+=`<div class="clc em"></div>`;
  html+=`</div><div class="cleg">
    <div class="cli"><div class="clt2" style="background:#DBEAFE"></div>구조재정비</div>
    <div class="cli"><div class="clt2" style="background:#FCE7F3"></div>필수★★★★</div>
    <div class="cli"><div class="clt2" style="background:#D1FAE5"></div>필수★★★</div>
    <div class="cli"><div class="clt2" style="background:#FEF3C7"></div>필수★★</div>
    <div class="cli"><div class="clt2" style="background:#EDE9FE"></div>필수★</div>
    <div class="cli"><div class="clt2" style="background:#FED7AA"></div>통합심화</div>
    <div class="cli"><div class="clt2" style="background:#F3F4F6"></div>최종점검</div>
    <div class="cli"><div class="clt2" style="background:#FEE2E2"></div>시험일</div>
  </div><div class="cti" id="cti"><span style="font-size:13px;color:var(--tx3)">날짜를 클릭하면 학습 내용이 표시돼요</span></div>`;
  el.innerHTML=html;
}
window.chM=function(d){
  window._calM=(window._calM||3)+d;
  if(window._calM<1){window._calM=12;window._calY=(window._calY||2026)-1;}
  if(window._calM>12){window._calM=1;window._calY=(window._calY||2026)+1;}
  rCal(document.getElementById('tc'));
};
window.om2=function(k,n){
  const el=document.getElementById('cti');if(!el)return;
  if(n<0){el.innerHTML=`<span style="font-size:13px;color:var(--tx3)">${k} — 학습 없는 날이에요</span>`;return;}
  const [num,dt,wd,h,pc,tl,bg,is,es,tp]=S[n-1];
  const p=ph(pc);
  el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
    <span class="ptag" style="background:${p.bg};color:${p.c}">D${num} · ${dt}</span>
    <span class="ptag" style="background:${p.bg};color:${p.c}">${p.l}</span>
  </div>
  <div style="font-size:14px;font-weight:600;margin-bottom:6px">${tl}</div>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:3px"><strong style="color:var(--tx)">배경</strong> ${bg}</div>
  <div style="font-size:12px;color:#DC2626;margin-bottom:3px"><strong style="color:var(--tx)">쟁점</strong> ${is}</div>
  <div style="font-size:12px;color:var(--tx2)"><strong style="color:var(--tx)">논술</strong> ${es}</div>`;
};
function rTopics(el){
  const done=tc();
  let h=`<div style="background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr)">
    <div style="padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:600">필수 20개 주제</span>
      <span style="font-size:13px;color:var(--tx2)">${done}/20 완료</span>
    </div>`;
  T.forEach(({n,t,p,c})=>{
    const done2=A.td[n];const ps=PRI[p]||PRI['-'];
    h+=`<div class="ti">
      <div class="tno">${n}</div>
      <div style="flex:1"><div class="tnm${done2?' dn':''}">${t}</div><div class="tcd">${c}</div></div>
      <span class="pri" style="background:${ps.bg};color:${ps.c}">${p}</span>
      <button class="btn btn-sm${done2?' btn-dn':''}" onclick="tgT(${n})">${done2?'완료':'미완료'}</button>
    </div>`;
  });
  el.innerHTML=h+'</div>';
}
function rNotes(el){
  const ent=Object.entries(A.notes).filter(([,v])=>v.trim());
  if(!ent.length){el.innerHTML='<div class="es">📝 아직 작성된 메모가 없어요<br>오늘 학습 탭에서 메모를 남겨보세요.</div>';return;}
  el.innerHTML=ent.sort((a,b)=>+a[0]-+b[0]).map(([n,note])=>{
    const row=S[+n-1];if(!row)return'';
    const [num,dt,,h,pc,tl]=row;const p=ph(pc);
    return`<div class="nc"><div class="nm">
      <span style="font-size:12px;color:var(--tx2);font-weight:500">D${num}·${dt}</span>
      <span class="ptag" style="background:${p.bg};color:${p.c};font-size:11px;padding:2px 7px">${p.l}</span>
      <span style="font-size:13px;font-weight:500">${tl}</span>
    </div><div class="nb">${note}</div></div>`;
  }).join('');
}
function om(n){
  const [num,dt,wd,h,pc,tl,bg,is,es,tp]=S[n-1];
  const p=ph(pc);const done=A.done[num];
  document.getElementById('mi').innerHTML=`
    <div class="mh">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="ptag" style="background:${p.bg};color:${p.c}">D${num}·${dt}</span>
        <span class="ptag" style="background:${p.bg};color:${p.c}">${p.l}</span>
      </div>
      <button class="mc" onclick="cm()">×</button>
    </div>
    <div class="mt">${tl}</div>
    <div class="mr"><div class="ml">배경·맥락</div><div class="mv">${bg}</div></div>
    <div class="mr"><div class="ml">핵심 쟁점</div><div class="mv" style="color:#DC2626">${is}</div></div>
    <div class="mr"><div class="ml">논술 과제</div><div class="mv">${es}</div></div>
    <div class="mr"><div class="ml">시간 배분</div><div class="mv" style="background:var(--sur2);padding:6px 8px;border-radius:var(--rs);border-left:3px solid var(--bl);font-size:12px">${tp}</div></div>
    <textarea class="na" rows="3" placeholder="메모..." id="mnt" style="margin-top:10px;width:100%">${A.notes[num]||''}</textarea>
    <div class="mf">
      <button class="btn${done?' btn-dn':''}" onclick="tgDM(${num})">${done?'✓ 완료 취소':'완료 체크'}</button>
      <button class="btn btn-pr" onclick="sNM(${num})">메모 저장</button>
    </div>`;
  document.getElementById('mo').classList.add('op');
}
function cm(){document.getElementById('mo').classList.remove('op');}
window.tgD=function(n){A.done[n]=!A.done[n];save();rt();}
window.tgDM=function(n){A.done[n]=!A.done[n];save();cm();rt();}
window.tgT=function(n){A.td[n]=!A.td[n];save();rTopics(document.getElementById('tc'));uh();}
window.sN=function(n){const e=document.getElementById('nt-'+n);if(e){A.notes[n]=e.value;save();alert('저장됐어요!');}}
window.sNM=function(n){const e=document.getElementById('mnt');if(e){A.notes[n]=e.value;save();cm();alert('저장됐어요!');}}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))cm();});
load();uh();rt();
document.title='D-'+dl()+' | 교육전문직 학습 관리';
</script>
</body>
</html>
